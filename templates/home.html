<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="style-modern">
    <div class="home-container">
        <header class="header">
            <h1>首页</h1>
            <div class="header-actions">
                <button class="icon-btn">🔔</button>
                <button class="icon-btn">⚙️</button>
            </div>
        </header>

        <main class="content">
            <div class="welcome-card">
                <h2>欢迎回来</h2>
                <p>今天想做些什么？</p>
            </div>

            <div class="feature-grid">
                <div class="feature-item">
                    <div class="feature-icon">📱</div>
                    <span class="feature-name">功能1</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">💬</div>
                    <span class="feature-name">功能2</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">📊</div>
                    <span class="feature-name">功能3</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🎯</div>
                    <span class="feature-name">功能4</span>
                </div>
            </div>

            <div class="section">
                <h3 class="section-title">最近动态</h3>
                <div class="card-list">
                    <div class="card">
                        <div class="card-content">
                            <h4>动态标题</h4>
                            <p>动态内容描述</p>
                        </div>
                        <div class="card-meta">2小时前</div>
                    </div>
                    <div class="card">
                        <div class="card-content">
                            <h4>动态标题</h4>
                            <p>动态内容描述</p>
                        </div>
                        <div class="card-meta">5小时前</div>
                    </div>
                </div>
            </div>
        </main>

        <nav class="tab-bar">
            <a href="#" class="tab-item active">
                <span class="tab-icon">🏠</span>
                <span class="tab-name">首页</span>
            </a>
            <a href="#" class="tab-item">
                <span class="tab-icon">🔍</span>
                <span class="tab-name">发现</span>
            </a>
            <a href="#" class="tab-item">
                <span class="tab-icon">💬</span>
                <span class="tab-name">消息</span>
            </a>
            <a href="#" class="tab-item">
                <span class="tab-icon">👤</span>
                <span class="tab-name">我的</span>
            </a>
        </nav>
    </div>
</body>
</html>
