<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Forge - Demo</title>
    <style>
        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --neutral-100: #f1f5f9;
            --neutral-900: #0f172a;
            --font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 24px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 48px;
        }

        .header h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .header p {
            font-size: 18px;
            opacity: 0.9;
        }

        .demo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            max-width: 800px;
            width: 100%;
        }

        .demo-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
        }

        .demo-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .demo-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }

        .demo-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--neutral-900);
            margin-bottom: 8px;
        }

        .demo-desc {
            font-size: 14px;
            color: #8e8ea0;
            line-height: 1.6;
        }

        .features {
            margin-top: 48px;
            max-width: 800px;
            width: 100%;
        }

        .features h2 {
            color: white;
            font-size: 24px;
            text-align: center;
            margin-bottom: 24px;
        }

        .feature-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .feature-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            color: white;
            font-size: 14px;
        }

        .feature-item strong {
            display: block;
            margin-bottom: 4px;
        }

        .footer {
            margin-top: 48px;
            color: white;
            opacity: 0.8;
            font-size: 14px;
        }

        @media (max-width: 767px) {
            .header h1 {
                font-size: 28px;
            }

            .header p {
                font-size: 16px;
            }

            .demo-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>UI Forge</h1>
        <p>专业的APP和Web UI设计工具</p>
    </div>

    <div class="demo-grid">
        <a href="login-demo.html" class="demo-card">
            <div class="demo-icon">🔐</div>
            <h3 class="demo-title">登录页 Demo</h3>
            <p class="demo-desc">支持5种设计风格切换，包含完整的登录流程UI</p>
        </a>

        <a href="home-demo.html" class="demo-card">
            <div class="demo-icon">🏠</div>
            <h3 class="demo-title">首页 Demo</h3>
            <p class="demo-desc">展示首页布局、功能网格、动态列表和底部导航</p>
        </a>
    </div>

    <div class="features">
        <h2>支持的特性</h2>
        <div class="feature-list">
            <div class="feature-item">
                <strong>5种设计风格</strong>
                现代、简约、商务、科技、活泼
            </div>
            <div class="feature-item">
                <strong>响应式设计</strong>
                自动适配手机、平板、桌面
            </div>
            <div class="feature-item">
                <strong>设计Token</strong>
                完整的颜色、字体、间距系统
            </div>
            <div class="feature-item">
                <strong>丰富动效</strong>
                基础动画、过渡效果、高级交互
            </div>
        </div>
    </div>

    <div class="footer">
        <p>UI Forge v0.1.0 | MIT License</p>
    </div>
</body>
</html>
