<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 Demo - UI Forge</title>
    <style>
        /* 设计Token */
        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --neutral-50: #f8fafc;
            --neutral-100: #f1f5f9;
            --neutral-200: #e2e8f0;
            --neutral-900: #0f172a;
            --success-color: #22c55e;
            --warning-color: #f59e0b;
            --error-color: #ef4444;
            --font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            --font-size-h1: 24px;
            --font-size-h2: 20px;
            --font-size-body: 16px;
            --font-size-caption: 14px;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --spacing-xxl: 48px;
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--neutral-100);
        }

        /* 风格切换按钮 */
        .style-switcher {
            position: fixed;
            top: var(--spacing-md);
            left: var(--spacing-md);
            display: flex;
            gap: var(--spacing-sm);
            z-index: 100;
            flex-wrap: wrap;
        }

        .style-btn {
            padding: var(--spacing-sm) var(--spacing-md);
            border: 2px solid #e8e8ed;
            border-radius: var(--radius-sm);
            background: white;
            cursor: pointer;
            font-size: var(--font-size-caption);
            transition: all 0.2s ease;
        }

        .style-btn:hover {
            border-color: var(--primary-color);
        }

        .style-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* 主容器 */
        .home-container {
            flex: 1;
            max-width: 480px;
            margin: 0 auto;
            background: white;
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.5s ease-out;
        }

        /* 现代风格 */
        body.style-modern {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
        }

        body.style-modern .home-container {
            border-radius: var(--radius-xl);
            margin-top: 60px;
        }

        /* 简约风格 */
        body.style-minimalist {
            background: white;
        }

        body.style-minimalist .home-container {
            box-shadow: none;
            border: 1px solid #e8e8ed;
            border-radius: var(--radius-xl);
            margin-top: 60px;
        }

        /* 商务风格 */
        body.style-business {
            background: #f0f4f8;
        }

        body.style-business .home-container {
            border-radius: var(--radius-sm);
            margin-top: 60px;
        }

        /* 科技风格 */
        body.style-tech {
            background: #0a0a0f;
        }

        body.style-tech .home-container {
            background: #1a1a2e;
            border: 1px solid #2a2a3e;
            border-radius: var(--radius-xl);
            margin-top: 60px;
        }

        body.style-tech .header {
            background: #1a1a2e;
            border-bottom: 1px solid #2a2a3e;
        }

        body.style-tech .feature-item {
            background: #0d0d15;
            border: 1px solid #2a2a3e;
        }

        body.style-tech .card {
            background: #0d0d15;
            border: 1px solid #2a2a3e;
        }

        body.style-tech .tab-bar {
            background: #1a1a2e;
            border-top: 1px solid #2a2a3e;
        }

        /* 活泼风格 */
        body.style-playful {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
        }

        body.style-playful .home-container {
            border-radius: 32px;
            margin-top: 60px;
        }

        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-md);
            background: white;
            border-bottom: 1px solid #e8e8ed;
        }

        .header h1 {
            font-size: var(--font-size-h2);
            font-weight: 600;
            color: var(--neutral-900);
        }

        .header-actions {
            display: flex;
            gap: var(--spacing-sm);
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: var(--neutral-100);
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            background: var(--neutral-200);
        }

        /* 内容区域 */
        .content {
            flex: 1;
            padding: var(--spacing-md);
            overflow-y: auto;
        }

        .welcome-card {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            color: white;
            margin-bottom: var(--spacing-lg);
        }

        .welcome-card h2 {
            font-size: var(--font-size-h2);
            margin-bottom: var(--spacing-xs);
        }

        .welcome-card p {
            font-size: var(--font-size-body);
            opacity: 0.9;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
        }

        .feature-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--spacing-sm);
            padding: var(--spacing-md);
            background: white;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .feature-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .feature-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--neutral-100);
            border-radius: var(--radius-sm);
            font-size: 24px;
        }

        .feature-name {
            font-size: var(--font-size-caption);
            color: var(--neutral-900);
            font-weight: 500;
        }

        .section {
            margin-bottom: var(--spacing-lg);
        }

        .section-title {
            font-size: var(--font-size-h2);
            font-weight: 600;
            color: var(--neutral-900);
            margin-bottom: var(--spacing-md);
        }

        .card-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }

        .card {
            background: white;
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .card-content h4 {
            font-size: var(--font-size-body);
            font-weight: 600;
            color: var(--neutral-900);
            margin-bottom: var(--spacing-xs);
        }

        .card-content p {
            font-size: var(--font-size-caption);
            color: #8e8ea0;
        }

        .card-meta {
            font-size: var(--font-size-caption);
            color: #8e8ea0;
            flex-shrink: 0;
        }

        /* 底部导航 */
        .tab-bar {
            display: flex;
            justify-content: space-around;
            padding: var(--spacing-sm) 0;
            background: white;
            border-top: 1px solid #e8e8ed;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--spacing-xs);
            padding: var(--spacing-sm);
            text-decoration: none;
            color: #8e8ea0;
            transition: all 0.2s ease;
        }

        .tab-item.active {
            color: var(--primary-color);
        }

        .tab-icon {
            font-size: 24px;
        }

        .tab-name {
            font-size: var(--font-size-caption);
        }

        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 响应式 */
        @media (max-width: 767px) {
            body {
                padding: 0;
            }

            .style-switcher {
                position: relative;
                top: 0;
                left: 0;
                justify-content: center;
                padding: var(--spacing-md);
                background: white;
                border-bottom: 1px solid #e8e8ed;
            }

            .home-container {
                max-width: 100%;
                border-radius: 0;
                margin-top: 0;
            }
        }

        @media (min-width: 768px) and (max-width: 1023px) {
            .home-container {
                max-width: 480px;
                margin-top: 60px;
            }
        }

        @media (min-width: 1024px) {
            .home-container {
                max-width: 420px;
                margin-top: 60px;
            }
        }
    </style>
</head>
<body class="style-modern">
    <div class="style-switcher">
        <button class="style-btn active" onclick="switchStyle('modern')">现代风格</button>
        <button class="style-btn" onclick="switchStyle('minimalist')">简约风格</button>
        <button class="style-btn" onclick="switchStyle('business')">商务风格</button>
        <button class="style-btn" onclick="switchStyle('tech')">科技风格</button>
        <button class="style-btn" onclick="switchStyle('playful')">活泼风格</button>
    </div>

    <div class="home-container">
        <header class="header">
            <h1>首页</h1>
            <div class="header-actions">
                <button class="icon-btn">🔔</button>
                <button class="icon-btn">⚙️</button>
            </div>
        </header>

        <main class="content">
            <div class="welcome-card">
                <h2>欢迎回来</h2>
                <p>今天想做些什么？</p>
            </div>

            <div class="feature-grid">
                <div class="feature-item">
                    <div class="feature-icon">📱</div>
                    <span class="feature-name">功能1</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">💬</div>
                    <span class="feature-name">功能2</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">📊</div>
                    <span class="feature-name">功能3</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🎯</div>
                    <span class="feature-name">功能4</span>
                </div>
            </div>

            <div class="section">
                <h3 class="section-title">最近动态</h3>
                <div class="card-list">
                    <div class="card">
                        <div class="card-content">
                            <h4>动态标题</h4>
                            <p>动态内容描述</p>
                        </div>
                        <div class="card-meta">2小时前</div>
                    </div>
                    <div class="card">
                        <div class="card-content">
                            <h4>动态标题</h4>
                            <p>动态内容描述</p>
                        </div>
                        <div class="card-meta">5小时前</div>
                    </div>
                </div>
            </div>
        </main>

        <nav class="tab-bar">
            <a href="#" class="tab-item active">
                <span class="tab-icon">🏠</span>
                <span class="tab-name">首页</span>
            </a>
            <a href="#" class="tab-item">
                <span class="tab-icon">🔍</span>
                <span class="tab-name">发现</span>
            </a>
            <a href="#" class="tab-item">
                <span class="tab-icon">💬</span>
                <span class="tab-name">消息</span>
            </a>
            <a href="#" class="tab-item">
                <span class="tab-icon">👤</span>
                <span class="tab-name">我的</span>
            </a>
        </nav>
    </div>

    <script>
        function switchStyle(style) {
            document.body.className = 'style-' + style;
            document.querySelectorAll('.style-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
