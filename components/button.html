<!-- 按钮组件 -->

<!-- 基础按钮 -->
<button class="button-primary">主要按钮</button>
<button class="button-secondary">次要按钮</button>
<button class="button-outline">边框按钮</button>
<button class="button-text">文字按钮</button>

<!-- 不同尺寸 -->
<button class="button-primary button-sm">小按钮</button>
<button class="button-primary button-md">中按钮</button>
<button class="button-primary button-lg">大按钮</button>

<!-- 带图标按钮 -->
<button class="button-primary button-icon">
    <span class="button-icon-left">➕</span>
    添加
</button>
<button class="button-primary button-icon">
    提交
    <span class="button-icon-right">→</span>
</button>

<!-- 只有图标按钮 -->
<button class="button-primary button-icon-only">➕</button>
<button class="button-secondary button-icon-only">✏️</button>
<button class="button-outline button-icon-only">🗑️</button>

<!-- 禁用按钮 -->
<button class="button-primary" disabled>禁用按钮</button>

<!-- 加载按钮 -->
<button class="button-primary button-loading">
    <span class="button-spinner"></span>
    加载中
</button>

<!-- 宽按钮 -->
<button class="button-primary button-full">全宽按钮</button>

<!-- 圆角按钮 -->
<button class="button-primary button-round">圆角按钮</button>
