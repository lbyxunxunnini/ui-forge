<!-- 卡片组件 -->

<!-- 基础卡片 -->
<div class="card">
    <div class="card-content">
        <h3 class="card-title">卡片标题</h3>
        <p class="card-description">卡片内容描述</p>
    </div>
</div>

<!-- 带图片卡片 -->
<div class="card card-with-image">
    <div class="card-image">
        <img src="placeholder.jpg" alt="图片">
    </div>
    <div class="card-content">
        <h3 class="card-title">卡片标题</h3>
        <p class="card-description">卡片内容描述</p>
    </div>
</div>

<!-- 带操作卡片 -->
<div class="card card-with-actions">
    <div class="card-content">
        <h3 class="card-title">卡片标题</h3>
        <p class="card-description">卡片内容描述</p>
    </div>
    <div class="card-actions">
        <button class="button-text">取消</button>
        <button class="button-primary">确定</button>
    </div>
</div>

<!-- 带标签卡片 -->
<div class="card card-with-tags">
    <div class="card-content">
        <div class="card-tags">
            <span class="card-tag">标签1</span>
            <span class="card-tag">标签2</span>
        </div>
        <h3 class="card-title">卡片标题</h3>
        <p class="card-description">卡片内容描述</p>
    </div>
</div>

<!-- 带徽章卡片 -->
<div class="card card-with-badge">
    <div class="card-badge">新</div>
    <div class="card-content">
        <h3 class="card-title">卡片标题</h3>
        <p class="card-description">卡片内容描述</p>
    </div>
</div>

<!-- 可点击卡片 -->
<div class="card card-clickable">
    <div class="card-content">
        <h3 class="card-title">可点击卡片</h3>
        <p class="card-description">点击查看更多</p>
    </div>
    <div class="card-arrow">→</div>
</div>

<!-- 列表项卡片 -->
<div class="card card-list-item">
    <div class="card-avatar">
        <img src="avatar.jpg" alt="头像">
    </div>
    <div class="card-content">
        <h3 class="card-title">用户名称</h3>
        <p class="card-description">用户描述信息</p>
    </div>
    <div class="card-meta">时间</div>
</div>
