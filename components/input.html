<!-- 输入框组件 -->

<!-- 基础输入框 -->
<div class="input-group">
    <input type="text" placeholder="请输入内容" class="input-field">
</div>

<!-- 带标签输入框 -->
<div class="input-group">
    <label class="input-label">手机号</label>
    <input type="tel" placeholder="请输入手机号" class="input-field">
</div>

<!-- 带图标输入框 -->
<div class="input-group input-with-icon">
    <span class="input-icon">🔍</span>
    <input type="text" placeholder="搜索" class="input-field">
</div>

<!-- 带错误提示输入框 -->
<div class="input-group input-error">
    <input type="text" placeholder="请输入内容" class="input-field">
    <span class="input-error-message">请输入正确的内容</span>
</div>

<!-- 带成功提示输入框 -->
<div class="input-group input-success">
    <input type="text" placeholder="请输入内容" class="input-field">
    <span class="input-success-message">验证通过</span>
</div>

<!-- 禁用输入框 -->
<div class="input-group">
    <input type="text" placeholder="禁用状态" class="input-field" disabled>
</div>

<!-- 只读输入框 -->
<div class="input-group">
    <input type="text" value="只读内容" class="input-field" readonly>
</div>
